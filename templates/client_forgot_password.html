<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Khans & Co.</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">

<div class="login-card">

    <div class="logo-badge">KC</div>

    <h1>Forgot Password</h1>

    <p>
        Enter your Client Username.
        Admin will reset your password.
    </p>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Client Username"
            required
        >

        <button type="submit">
            Submit Reset Request
        </button>

    </form>

    {% if message %}
    <div
        style="
            margin-top:15px;
            padding:10px;
            background:#dcfce7;
            border-radius:8px;
            color:#166534;
            font-weight:bold;
        "
    >
        {{ message }}
    </div>
    {% endif %}

    <div class="login-links">

        <a href="/client-login">
            Back To Login
        </a>

        <a href="/client-register">
            Register
        </a>

    </div>

</div>

</body>
</html>
