<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
</head>
<body style="font-family:Arial; padding:30px;">

<h1>Notifications</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Message</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for row in notifications %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td><a href="/mark-notification-read/{{ row[0] }}">Mark Read</a></td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
