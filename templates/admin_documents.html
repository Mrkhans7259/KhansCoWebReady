<!DOCTYPE html>
<html>
<head>
    <title>Client Documents</title>
</head>
<body style="font-family:Arial; padding:30px;">

<h1>Uploaded Client Documents</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Document</th>
        <th>File</th>
        <th>Uploaded</th>
        <th>Download</th>
    </tr>

    {% for doc in documents %}
    <tr>
        <td>{{ doc[0] }}</td>
        <td>{{ doc[1] }}</td>
        <td>{{ doc[2] }}</td>
        <td>{{ doc[3] }}</td>
        <td>{{ doc[4] }}</td>
        <td><a href="/uploads/{{ doc[3] }}" target="_blank">Open</a></td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
