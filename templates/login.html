<!DOCTYPE html>
<html>
<head>
    <title>Khans & Co Login</title>
</head>
<body style="font-family:Arial; background:#f4f4f4; text-align:center; padding-top:100px;">

    <div style="width:350px; margin:auto; background:white; padding:30px; border-radius:10px;">
        <h2>Khans & Co.</h2>
        <h3>Compliance Manager</h3>

        <form method="POST">

            <button type="submit" style="padding:10px 25px;">Login</button>
        </form>
    </div>

</body>
</html>
