<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
</head>
<body style="font-family:Arial; background:#f4f6f8;">

<div style="width:600px; margin:40px auto; background:white; padding:30px; border-radius:10px;">

    <h1>✏️ Edit User</h1>

    <form method="POST">

        <p>Username</p>
        <input
            type="text"
            name="username"
            value="{{ user[1] }}"
            required
            style="width:100%; padding:10px;"
        >

        <p>New Password (Leave Blank to Keep Existing)</p>
        <input
            type="password"
            name="password"
            style="width:100%; padding:10px;"
        >

        <p>Role</p>
        <select
            name="role"
            style="width:100%; padding:10px;"
        >
            <option {% if user[2] == 'Admin' %}selected{% endif %}>Admin</option>
            <option {% if user[2] == 'User' %}selected{% endif %}>User</option>
        </select>

        <br><br>

        <button
            type="submit"
            style="padding:10px 20px;"
        >
            Update User
        </button>

        <a href="/users">Cancel</a>

    </form>

</div>

</body>
</html>
